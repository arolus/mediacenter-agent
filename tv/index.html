<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaCenter TV</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="tv-header">
    <span class="tv-brand">🎬 MediaCenter</span>
    <span id="tv-device" class="tv-device"></span>
    <span class="tv-hint">↑↓←→ выбор · OK играть</span>
  </header>
  <main id="tv-main">
    <p id="tv-loading" class="tv-empty">Загружаю коллекцию…</p>
  </main>
  <div id="tv-overlay" class="tv-overlay hidden"><div class="tv-overlay-box" id="tv-overlay-text"></div></div>
  <script src="/app.js"></script>
</body>
</html>
