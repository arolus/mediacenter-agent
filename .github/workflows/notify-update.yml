# (Опционально) Мгновенное обновление нод при пуше в репозиторий агента.
# На push в main пишет sha коммита в Firestore-док config/version. Агенты слушают этот док
# (onSnapshot) и, увидев новый sha, перезапускаются с git pull.
# Без этого workflow обновление всё равно работает — агенты опрашивают git раз в ~10 минут.
#
# Пока не настроен — job ПРОПУСКАЕТСЯ (skipped, не падает). Чтобы включить:
#   1. Settings → Secrets and variables → Actions → Variables: добавь FIREBASE_PROJECT_ID = <project id>.
#   2. Там же в Secrets: FIREBASE_SA = JSON-ключ service account с ролью "Cloud Datastore User".
name: notify-update
on:
  push:
    branches: [ main ]
jobs:
  notify:
    runs-on: ubuntu-latest
    # Запускаемся только когда задана переменная проекта — иначе job skipped (без ошибки).
    if: ${{ vars.FIREBASE_PROJECT_ID != '' }}
    env:
      PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Write config/version
        run: |
          TOKEN=$(gcloud auth print-access-token)
          curl -s -X PATCH \
            "https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/config/version?updateMask.fieldPaths=sha&updateMask.fieldPaths=updatedAt" \
            -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" \
            -d "{\"fields\":{\"sha\":{\"stringValue\":\"${GITHUB_SHA}\"},\"updatedAt\":{\"timestampValue\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}}"
